<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${usuario.id == null} ? 'Crear Usuario' : 'Editar Usuario'"></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 th:text="${usuario.id == null} ? '➕ Crear Nuevo Usuario' : '✏️ Editar Usuario'"></h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="${usuario.id == null} ? '/admin/usuarios/crear' : '/admin/usuarios/actualizar/' + ${usuario.id}" 
              method="post">
            
            <div class="form-group">
                <label>Nombre de usuario:</label>
                <input type="text" name="nombre" th:value="${usuario.nombre}" required 
                       th:readonly="${usuario.id != null}">
                <small th:if="${usuario.id != null}" style="color: #666; font-size: 12px;">
                    El nombre no se puede modificar
                </small>
            </div>

            <div class="form-group" th:if="${usuario.id == null}">
                <label>Contraseña:</label>
                <input type="password" name="contrasena" required>
            </div>

            <div class="form-group">
                <label>Edad:</label>
                <input type="number" name="edad" th:value="${usuario.edad}" required>
            </div>

            <div class="form-group">
                <label>Peso (kg):</label>
                <input type="number" step="0.1" name="peso" th:value="${usuario.peso}" required>
            </div>

            <div class="form-group">
                <label>Altura (cm):</label>
                <input type="number" step="0.1" name="altura" th:value="${usuario.altura}" required>
            </div>

            <div class="form-group">
                <label>Rol:</label>
                <select name="rol">
                    <option value="USER" th:selected="${usuario.rol == 'USER'}">👤 Usuario Normal</option>
                    <option value="ADMIN" th:selected="${usuario.rol == 'ADMIN'}">👑 Administrador</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${usuario.id == null} ? 'Crear Usuario' : 'Actualizar Usuario'"></span>
                </button>
                <a href="/admin/panel" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
