<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Rutinas - Crear Cuenta</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Elementos decorativos */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tarjeta principal */
        .register-card {
            background: white;
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        /* Header */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand i {
            font-size: 3rem;
            background: linear-gradient(45deg, #00b09b, #96c93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 0.5rem;
        }

        .brand p {
            color: #7f8c8d;
            font-size: 1rem;
        }

        /* Formulario */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group label i {
            margin-right: 0.5rem;
            color: #00b09b;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00b09b;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 176, 155, 0.1);
        }

        .input-group input::placeholder {
            color: #a0aec0;
            font-size: 0.9rem;
        }

        /* Campos numéricos */
        .input-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .input-group input[type="number"]::-webkit-outer-spin-button,
        .input-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Tooltip informativo */
        .field-info {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.3rem;
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .field-info i {
            color: #00b09b;
            font-size: 0.8rem;
        }

        /* Botón de registro */
        .btn-register {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #00b09b, #96c93d);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 176, 155, 0.4);
        }

        .btn-register i {
            font-size: 1.2rem;
        }

        /* Separador */
        .divider {
            text-align: center;
            margin: 1rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            color: #7f8c8d;
            font-size: 0.9rem;
            position: relative;
            z-index: 2;
        }

        /* Enlace a login */
        .login-section {
            text-align: center;
        }

        .login-section p {
            color: #4a5568;
            margin-bottom: 0.8rem;
        }

        .btn-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #00b09b;
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #f0f9f7;
            transform: translateX(-5px);
        }

        /* Volver link */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #00b09b;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            .register-card {
                padding: 1.8rem;
            }

            .brand h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <!-- Header -->
            <div class="brand">
                <i class="fas fa-user-plus"></i>
                <h1>Crear Cuenta</h1>
                <p>Comienza tu viaje fitness hoy</p>
            </div>

            <!-- Formulario de registro -->
            <form action="/registro" method="post">
                <div class="form-grid">
                    <!-- Nombre de usuario -->
                    <div class="form-group full-width">
                        <label>
                            <i class="fas fa-user"></i> Nombre de usuario
                        </label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" name="nom" required 
                                   placeholder="Ej: juan_perez" autocomplete="off">
                        </div>
                        <div class="field-info">
                            <i class="fas fa-info-circle"></i>
                            <span>Mínimo 3 caracteres</span>
                        </div>
                    </div>

                    <!-- Contraseña -->
                    <div class="form-group full-width">
                        <label>
                            <i class="fas fa-lock"></i> Contraseña
                        </label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="cont" required 
                                   placeholder="••••••••">
                        </div>
                        <div class="field-info">
                            <i class="fas fa-info-circle"></i>
                            <span>Mínimo 6 caracteres</span>
                        </div>
                    </div>

                    <!-- Edad y Peso  -->
                    <div class="form-group">
                        <label>
                            <i class="fas fa-calendar"></i> Edad
                        </label>
                        <div class="input-group">
                            <i class="fas fa-calendar"></i>
                            <input type="number" name="edad" required 
                                   placeholder="25" min="1" max="120">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>
                            <i class="fas fa-weight-scale"></i> Peso (kg)
                        </label>
                        <div class="input-group">
                            <i class="fas fa-weight-scale"></i>
                            <input type="number" step="0.1" name="peso" required 
                                   placeholder="70.5" min="20" max="300">
                        </div>
                    </div>

                    <!-- Altura (ocupa todo el ancho porque es un dato importante) -->
                    <div class="form-group full-width">
                        <label>
                            <i class="fas fa-ruler-vertical"></i> Altura (cm)
                        </label>
                        <div class="input-group">
                            <i class="fas fa-ruler-vertical"></i>
                            <input type="number" step="0.01" name="altura" required 
                                   placeholder="178" min="110" max="240">
                        </div>
                        <div class="field-info">
                            <i class="fas fa-info-circle"></i>
                            <span>Ejemplo: 175 para 1 metro 75 cm</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-user-plus"></i>
                    Registrarse
                </button>
            </form>

            <!-- Separador -->
            <div class="divider">
                <span>¿Ya tienes cuenta?</span>
            </div>

            <!-- Enlace a login -->
            <div class="login-section">
                <a href="/login" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </a>
            </div>

            <!-- Volver al login (visible) -->
            <div class="back-link">
                <a href="/login">
                    <i class="fas fa-arrow-left"></i>
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>
</body>
</html>
